<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — MarocShop</title>
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --ink: #1d1d1f;
        --ink-muted: #6e6e73;
        --ink-faint: #aeaeb2;
        --bg: #f5f5f7;
        --surface: #fff;
        --border: #d2d2d7;
        --border-faint: #e8e8ed;
        --green: #1a9e5c;
        --orange: #e07b00;
        --blue: #0070c9;
        --red: #d1302f;
        --radius: 8px;
      }
      body {
        font-family:
          'Inter',
          -apple-system,
          sans-serif;
        background: var(--bg);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
      }
      a {
        color: inherit;
        text-decoration: none;
      }

      /* ── Login ── */
      #login-screen {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 40px;
        width: 100%;
        max-width: 360px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
      }
      .login-logo {
        font-size: 1.3rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
      }
      .login-logo span {
        color: var(--ink-muted);
      }
      .login-label {
        font-size: 0.78rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ink-muted);
        margin-bottom: 6px;
        display: block;
      }
      .login-input {
        width: 100%;
        padding: 10px 12px;
        border: 1.5px solid var(--border);
        border-radius: var(--radius);
        font-size: 0.95rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
      }
      .login-input:focus {
        border-color: var(--ink);
      }
      .login-btn {
        width: 100%;
        margin-top: 16px;
        padding: 11px;
        background: var(--ink);
        color: #fff;
        border: none;
        border-radius: var(--radius);
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }
      .login-btn:hover {
        background: #000;
      }
      .login-error {
        color: var(--red);
        font-size: 0.83rem;
        margin-top: 10px;
        display: none;
      }

      /* ── App shell ── */
      #app {
        display: none;
        min-height: 100vh;
      }
      .topbar {
        background: var(--surface);
        border-bottom: 1px solid var(--border-faint);
        padding: 0 24px;
        height: 56px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-logo {
        font-size: 1.05rem;
        font-weight: 800;
        letter-spacing: -0.02em;
      }
      .topbar-logo span {
        color: var(--ink-muted);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .topbar-refresh {
        padding: 6px 14px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        background: var(--surface);
        display: flex;
        align-items: center;
        gap: 6px;
        transition: border-color 0.15s;
      }
      .topbar-refresh:hover {
        border-color: var(--ink);
      }
      .export-btn {
        padding: 6px 14px;
        border: 1.5px solid var(--green);
        border-radius: 6px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        background: var(--surface);
        display: flex;
        align-items: center;
        gap: 6px;
        transition: all 0.15s;
        color: var(--green);
      }
      .export-btn:hover {
        background: var(--green);
        color: #fff;
      }
      .logout-btn {
        font-size: 0.82rem;
        color: var(--ink-muted);
        cursor: pointer;
      }
      .logout-btn:hover {
        color: var(--ink);
      }

      /* ── Stats row ── */
      .main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--border-faint);
        border-radius: var(--radius);
        padding: 18px 20px;
      }
      .stat-label {
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--ink-muted);
        margin-bottom: 6px;
      }
      .stat-value {
        font-size: 1.6rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: var(--ink);
      }
      .stat-value.green {
        color: var(--green);
      }
      .stat-value.orange {
        color: var(--orange);
      }
      .stat-value.blue {
        color: var(--blue);
      }

      /* ── Filters ── */
      .toolbar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 16px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 6px 14px;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        background: var(--surface);
        transition: all 0.15s;
        color: var(--ink-muted);
      }
      .filter-btn:hover {
        border-color: var(--ink);
        color: var(--ink);
      }
      .filter-btn.active {
        background: var(--ink);
        color: #fff;
        border-color: var(--ink);
      }
      .search-input {
        padding: 7px 12px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        font-size: 0.85rem;
        font-family: inherit;
        outline: none;
        transition: border-color 0.15s;
        width: 220px;
      }
      .search-input:focus {
        border-color: var(--ink);
      }

      /* ── Table ── */
      .table-wrap {
        background: var(--surface);
        border: 1px solid var(--border-faint);
        border-radius: var(--radius);
        overflow: hidden;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }
      thead {
        background: var(--bg);
      }
      th {
        text-align: left;
        padding: 11px 16px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--ink-muted);
        border-bottom: 1px solid var(--border-faint);
      }
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--border-faint);
        vertical-align: top;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: var(--bg);
      }

      .order-id {
        font-size: 0.75rem;
        color: var(--ink-faint);
        font-weight: 600;
      }
      .customer-name {
        font-weight: 600;
        color: var(--ink);
      }
      .customer-phone {
        font-size: 0.82rem;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .customer-city {
        font-size: 0.82rem;
        color: var(--ink-muted);
      }
      .product-name-cell {
        font-weight: 600;
        font-size: 0.88rem;
      }
      .product-qty {
        font-size: 0.8rem;
        color: var(--ink-muted);
        margin-top: 2px;
      }
      .order-date {
        font-size: 0.8rem;
        color: var(--ink-muted);
        white-space: nowrap;
      }

      /* Status badge */
      .status-badge {
        display: inline-block;
        padding: 3px 10px;
        border-radius: 20px;
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .status-pending {
        background: #fff7e6;
        color: var(--orange);
      }
      .status-confirmed {
        background: #e6f4ea;
        color: var(--green);
      }
      .status-shipped {
        background: #e6f0fb;
        color: var(--blue);
      }
      .status-delivered {
        background: #e6f4ea;
        color: #135d38;
      }
      .status-cancelled {
        background: #fde8e8;
        color: var(--red);
      }

      /* Status select */
      .status-select {
        padding: 4px 8px;
        border: 1.5px solid var(--border);
        border-radius: 6px;
        font-size: 0.78rem;
        font-family: inherit;
        cursor: pointer;
        outline: none;
        background: var(--surface);
        transition: border-color 0.15s;
      }
      .status-select:focus {
        border-color: var(--ink);
      }

      /* WhatsApp button */
      .wa-btn {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        margin-top: 8px;
        padding: 5px 10px;
        background: #25d366;
        color: #fff;
        border-radius: 6px;
        font-size: 0.78rem;
        font-weight: 700;
        text-decoration: none;
        transition: background 0.15s;
        white-space: nowrap;
      }
      .wa-btn:hover {
        background: #1ebe5d;
      }
      .wa-btn svg {
        flex-shrink: 0;
      }

      /* Loading / empty */
      .empty-state {
        text-align: center;
        padding: 56px 24px;
        color: var(--ink-muted);
      }
      .empty-icon {
        font-size: 2rem;
        margin-bottom: 12px;
      }
      .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid var(--border);
        border-top-color: var(--ink);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        right: 24px;
        background: var(--ink);
        color: #fff;
        padding: 10px 18px;
        border-radius: 8px;
        font-size: 0.85rem;
        font-weight: 600;
        opacity: 0;
        transform: translateY(8px);
        transition: all 0.25s;
        pointer-events: none;
        z-index: 999;
      }
      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 700px) {
        .main {
          padding: 16px;
        }
        .stats-grid {
          grid-template-columns: 1fr 1fr;
        }
        th:nth-child(5),
        td:nth-child(5) {
          display: none;
        }
        .search-input {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── Login ── -->
    <div id="login-screen">
      <div class="login-box">
        <div class="login-logo">Maroc<span>Shop</span> Admin</div>
        <label class="login-label" for="pwd-input">Mot de passe</label>
        <input
          type="password"
          id="pwd-input"
          class="login-input"
          placeholder="••••••••"
          autocomplete="current-password"
        />
        <button class="login-btn" id="login-btn">Se connecter</button>
        <div class="login-error" id="login-error">Mot de passe incorrect.</div>
      </div>
    </div>

    <!-- ── App ── -->
    <div id="app">
      <header class="topbar">
        <div class="topbar-logo">
          Maroc<span>Shop</span>
          <span style="font-weight: 400; color: var(--ink-muted)">/ Admin</span>
        </div>
        <div class="topbar-right">
          <button class="export-btn" id="export-btn">⬇ Exporter CSV</button>
          <button class="topbar-refresh" id="refresh-btn">
            <span id="refresh-icon">↻</span> Actualiser
          </button>
          <span class="logout-btn" id="logout-btn">Déconnexion</span>
        </div>
      </header>

      <main class="main">
        <!-- Stats -->
        <div class="stats-grid" id="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total commandes</div>
            <div class="stat-value" id="s-total">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">En attente</div>
            <div class="stat-value orange" id="s-pending">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Confirmées</div>
            <div class="stat-value green" id="s-confirmed">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Expédiées</div>
            <div class="stat-value blue" id="s-shipped">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Livrées</div>
            <div class="stat-value green" id="s-delivered">—</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Annulées</div>
            <div class="stat-value" id="s-cancelled" style="color: var(--ink-faint)">—</div>
          </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
          <button class="filter-btn active" data-filter="all">Toutes</button>
          <button class="filter-btn" data-filter="pending">En attente</button>
          <button class="filter-btn" data-filter="confirmed">Confirmées</button>
          <button class="filter-btn" data-filter="shipped">Expédiées</button>
          <button class="filter-btn" data-filter="delivered">Livrées</button>
          <button class="filter-btn" data-filter="cancelled">Annulées</button>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="Rechercher client, produit..."
          />
        </div>

        <!-- Table -->
        <div class="table-wrap">
          <table id="orders-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Client</th>
                <th>Produit</th>
                <th>Statut</th>
                <th>Date</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="orders-body">
              <tr>
                <td colspan="6" class="empty-state"><div class="spinner"></div></td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script type="module">
      /* ─── Config ──────────────────────────────────────────────── */
      const ADMIN_PASSWORD = 'admin123'; // change this to your real password
      const SESSION_KEY = 'marocshop_admin_auth';

      /* ─── Auth ────────────────────────────────────────────────── */
      function isLoggedIn() {
        return sessionStorage.getItem(SESSION_KEY) === '1';
      }
      function login(pwd) {
        if (pwd === ADMIN_PASSWORD) {
          sessionStorage.setItem(SESSION_KEY, '1');
          return true;
        }
        return false;
      }
      function logout() {
        sessionStorage.removeItem(SESSION_KEY);
        location.reload();
      }

      if (isLoggedIn()) showApp();
      else showLogin();

      document.getElementById('login-btn').addEventListener('click', doLogin);
      document.getElementById('pwd-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') doLogin();
      });
      document.getElementById('logout-btn').addEventListener('click', logout);

      function doLogin() {
        const pwd = document.getElementById('pwd-input').value;
        if (login(pwd)) {
          showApp();
        } else {
          document.getElementById('login-error').style.display = 'block';
        }
      }

      function showLogin() {
        document.getElementById('login-screen').style.display = 'flex';
        document.getElementById('app').style.display = 'none';
        setTimeout(() => document.getElementById('pwd-input').focus(), 50);
      }

      function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadOrders();
      }

      /* ─── Data ────────────────────────────────────────────────── */
      let allOrders = [];
      let activeFilter = 'all';
      let searchQuery = '';

      async function loadOrders() {
        try {
          const res = await fetch('/api/orders');
          allOrders = await res.json();
          renderStats();
          renderTable();
        } catch (err) {
          showToast('Erreur de chargement', true);
        }
      }

      /* ─── Stats ───────────────────────────────────────────────── */
      function renderStats() {
        const count = (s) => allOrders.filter((o) => o.status === s).length;
        document.getElementById('s-total').textContent = allOrders.length;
        document.getElementById('s-pending').textContent = count('pending');
        document.getElementById('s-confirmed').textContent = count('confirmed');
        document.getElementById('s-shipped').textContent = count('shipped');
        document.getElementById('s-delivered').textContent = count('delivered');
        document.getElementById('s-cancelled').textContent = count('cancelled');
      }

      /* ─── Table ───────────────────────────────────────────────── */
      const STATUS_LABELS = {
        pending: 'En attente',
        confirmed: 'Confirmée',
        shipped: 'Expédiée',
        delivered: 'Livrée',
        cancelled: 'Annulée',
      };

      function renderTable() {
        let orders = allOrders;
        if (activeFilter !== 'all') orders = orders.filter((o) => o.status === activeFilter);
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          orders = orders.filter(
            (o) =>
              o.name.toLowerCase().includes(q) ||
              o.phone.toLowerCase().includes(q) ||
              o.city.toLowerCase().includes(q) ||
              o.productName.toLowerCase().includes(q),
          );
        }

        const tbody = document.getElementById('orders-body');
        if (!orders.length) {
          tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📭</div>Aucune commande</div></td></tr>`;
          return;
        }

        tbody.innerHTML = orders
          .map((o) => {
            const date = new Date(o.createdAt);
            const dateStr = date.toLocaleDateString('fr-MA', {
              day: '2-digit',
              month: 'short',
              year: 'numeric',
            });
            const timeStr = date.toLocaleTimeString('fr-MA', {
              hour: '2-digit',
              minute: '2-digit',
            });
            return `
        <tr>
          <td><div class="order-id">#${o.id}</div></td>
          <td>
            <div class="customer-name">${esc(o.name)}</div>
            <div class="customer-phone">${esc(o.phone)}</div>
            <div class="customer-city">${esc(o.city)}</div>
          </td>
          <td>
            <div class="product-name-cell">${esc(o.productName)}</div>
            <div class="product-qty">Qté : ${o.quantity}</div>
            ${o.notes ? `<div class="product-qty" style="color:var(--ink)">${esc(o.notes)}</div>` : ''}
          </td>
          <td><span class="status-badge status-${o.status}">${STATUS_LABELS[o.status] || o.status}</span></td>
          <td class="order-date">${dateStr}<br>${timeStr}</td>
          <td>
            <select class="status-select" data-id="${o.id}" data-current="${o.status}">
              <option value="pending"   ${o.status === 'pending' ? 'selected' : ''}>En attente</option>
              <option value="confirmed" ${o.status === 'confirmed' ? 'selected' : ''}>Confirmée</option>
              <option value="shipped"   ${o.status === 'shipped' ? 'selected' : ''}>Expédiée</option>
              <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Livrée</option>
              <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Annulée</option>
            </select>
            <br>
            <a class="wa-btn" href="${waLink(o)}" target="_blank" rel="noopener">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.128.558 4.122 1.532 5.853L.057 23.477a.75.75 0 0 0 .916.948l5.9-1.545A11.956 11.956 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.907 0-3.686-.528-5.208-1.443l-.372-.22-3.853 1.01 1.028-3.758-.241-.386A9.96 9.96 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/></svg>
              WhatsApp
            </a>
          </td>
        </tr>`;
          })
          .join('');

        // Status change listeners
        tbody.querySelectorAll('.status-select').forEach((sel) => {
          sel.addEventListener('change', async () => {
            const id = parseInt(sel.dataset.id);
            const status = sel.value;
            sel.disabled = true;
            try {
              const res = await fetch(`/api/orders/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status }),
              });
              if (!res.ok) throw new Error();
              const updated = await res.json();
              const order = allOrders.find((o) => o.id === id);
              if (order) order.status = updated.status;
              renderStats();
              renderTable();
              showToast('Statut mis à jour ✓');
            } catch {
              sel.value = sel.dataset.current;
              sel.disabled = false;
              showToast('Erreur de mise à jour', true);
            }
          });
        });
      }

      /* ─── Filters ─────────────────────────────────────────────── */
      document.querySelectorAll('.filter-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          renderTable();
        });
      });

      document.getElementById('search-input').addEventListener('input', (e) => {
        searchQuery = e.target.value.trim();
        renderTable();
      });

      /* ─── Refresh ─────────────────────────────────────────────── */
      document.getElementById('refresh-btn').addEventListener('click', async () => {
        const icon = document.getElementById('refresh-icon');
        icon.style.display = 'inline-block';
        icon.style.animation = 'spin .6s linear infinite';
        await loadOrders();
        icon.style.animation = '';
        showToast('Actualisé ✓');
      });

      /* ─── Toast ───────────────────────────────────────────────── */
      let toastTimer;
      function showToast(msg, isError = false) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.style.background = isError ? 'var(--red)' : 'var(--ink)';
        el.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
      }

      /* ─── Utils ───────────────────────────────────────────────── */
      function esc(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function waLink(o) {
        // Normalize Moroccan phone to international format (212XXXXXXXXX)
        let phone = String(o.phone).replace(/\s|-|\./g, '');
        if (phone.startsWith('0')) phone = '212' + phone.slice(1);
        else if (phone.startsWith('+')) phone = phone.slice(1);
        const msg =
          `Bonjour ${o.name} 👋\n` +
          `Nous avons bien reçu votre commande sur MarocShop :\n\n` +
          `🛍️ *${o.productName}* x${o.quantity}\n` +
          `📍 ${o.city}${o.address ? ', ' + o.address : ''}\n\n` +
          `Votre commande est *confirmée* et sera livrée dans les meilleurs délais.\n` +
          `Merci de votre confiance ! 🙏`;
        return `https://wa.me/${phone}?text=${encodeURIComponent(msg)}`;
      }

      /* ─── CSV Export ──────────────────────────────────────────── */
      document.getElementById('export-btn').addEventListener('click', exportCSV);

      function exportCSV() {
        if (!allOrders.length) {
          showToast('Aucune commande à exporter');
          return;
        }

        let orders = allOrders;
        if (activeFilter !== 'all') orders = orders.filter((o) => o.status === activeFilter);
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          orders = orders.filter(
            (o) =>
              o.name.toLowerCase().includes(q) ||
              o.phone.toLowerCase().includes(q) ||
              o.city.toLowerCase().includes(q) ||
              o.productName.toLowerCase().includes(q),
          );
        }

        const STATUS_FR = {
          pending: 'En attente',
          confirmed: 'Confirmée',
          shipped: 'Expédiée',
          delivered: 'Livrée',
          cancelled: 'Annulée',
        };

        const cols = [
          'ID',
          'Nom',
          'Téléphone',
          'Ville',
          'Adresse',
          'Produit',
          'Quantité',
          'Notes',
          'Statut',
          'Date',
        ];
        const rows = orders.map((o) =>
          [
            o.id,
            o.name,
            o.phone,
            o.city,
            o.address,
            o.productName,
            o.quantity,
            o.notes || '',
            STATUS_FR[o.status] || o.status,
            new Date(o.createdAt).toLocaleString('fr-MA'),
          ].map((v) => `"${String(v).replace(/"/g, '""')}"`),
        );

        const csv = '\uFEFF' + [cols, ...rows].map((r) => r.join(',')).join('\r\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const date = new Date().toISOString().slice(0, 10);
        const label = activeFilter === 'all' ? 'toutes' : activeFilter;
        a.href = url;
        a.download = `marocshop-commandes-${label}-${date}.csv`;
        a.click();
        URL.revokeObjectURL(url);
        showToast(`${orders.length} commande(s) exportée(s) ✓`);
      }

      /* Auto-refresh every 60s */
      setInterval(loadOrders, 60_000);
    </script>
  </body>
</html>
